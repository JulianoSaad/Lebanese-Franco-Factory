name: franco_synth
plugin: synth
family: conversion
direction: arabic_to_franco
language: lebanese_franco
version: 0.1.0
size: 100
seed: 42

# AI provider used to invent NEW phrases (not rule-based repeats).
# ollama on the AI server (10.21.100.51) is the free/local default.
provider: ollama
model: qwen2.5
host: http://127.0.0.1:11434

# how many phrases to request per model call, and few-shot examples per prompt
batch_size: 20
few_shot: 6

export:
  format: jsonl
  split:
    train: 0.90
    validation: 0.05
    test: 0.05
